{% set name = "rst2pdf" %}
{% set version = "0.104" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/rst2pdf-{{ version }}.tar.gz
  sha256: d68e8c721841e93d1e251b8d8bc9e766a42758cfbbf99469625128c4bb0495b3

build:
  entry_points:
    - rst2pdf = rst2pdf.createpdf:main
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - setuptools
    - setuptools-scm
    - wheel
    - pip
  run:
    - python >={{ python_min }}
    - docutils
    - importlib-metadata
    - jinja2
    - packaging
    - pygments
    - pyyaml
    - reportlab
    - smartypants

test:
  imports:
    - rst2pdf
  commands:
    - pip check
    - rst2pdf --help
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://rst2pdf.org
  license: MIT
  license_family: MIT
  license_file: LICENSE.txt
  summary: Convert reStructured Text to PDF via ReportLab.
  doc_url: https://rst2pdf.org/static/manual.html
  dev_url: https://github.com/rst2pdf/rst2pdf

extra:
  recipe-maintainers:
    - chrisburr
