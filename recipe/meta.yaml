{% set name = "rst2pdf" %}
{% set version = "0.105" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/rst2pdf-{{ version }}.tar.gz
  sha256: 857e8741014ec5015f7a00aafb5dccbb56378ef4c1da55a828d44bcf5ff3acdb

build:
  entry_points:
    - rst2pdf = rst2pdf.createpdf:main
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - setuptools
    - setuptools-scm
    - wheel
    - pip
  run:
    - python >={{ python_min }}
    - docutils
    - importlib-metadata
    - jinja2
    - packaging
    - pygments
    - pyyaml
    - reportlab
    - smartypants

test:
  imports:
    - rst2pdf
  commands:
    - pip check
    - rst2pdf --help
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://rst2pdf.org
  license: MIT
  license_family: MIT
  license_file: LICENSE.txt
  summary: Convert reStructured Text to PDF via ReportLab.
  doc_url: https://rst2pdf.org/static/manual.html
  dev_url: https://github.com/rst2pdf/rst2pdf

extra:
  recipe-maintainers:
    - chrisburr
